            </div>
        </nav>
    </header>
    <section class="hero">
        <div class="hero-content">
            <h1>Seguro de Auto</h1>
            <p>
                Sistema para determinar el costo de una póliza
                de seguro con base en el plan y características del conductor.
            </p>
            <div class="box">
                <label for="poliza">
                    Selecciona el tipo de póliza:
                </label>
                <br><br>
                <select id="poliza">
                    <option value="A">A - Cobertura Amplia ($1,200)</option>
                    <option value="B">B - Daños a Terceros ($950)</option>
                </select>
                <br><br>
                <label for="edad">
                    Ingresa tu edad:
                </label>
                <br><br>
                <input type="number" id="edad">
                <br><br>
                <label>
                    ¿Tienes hábito de beber alcohol?
                </label>
                <br><br>
                <select id="alcohol">
                    <option value="no">No</option>
                    <option value="si">Sí</option>
                </select>
                <br><br>
                <label>
                    ¿Usas lentes?
                </label>
                <br><br>
                <select id="lentes">
                    <option value="no">No</option>
                    <option value="si">Sí</option>
                </select>
                <br><br>
                <label>
                    ¿Padeces alguna enfermedad (cardiaca, diabetes, etc.)?
                </label>
                <br><br>
                <select id="enfermedad">
                    <option value="no">No</option>
                    <option value="si">Sí</option>
                </select>
                <br><br><br>
                <button onclick="seguroAuto()" class="btn">
                    Calcular
                </button>
                <br><br><br>
                <p id="resul">
                    Resultado
                </p>
            </div>
        </div>
    </section>
    <script src="./scripts/functions.js" defer></script>
